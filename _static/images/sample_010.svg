<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f0f0f0"/>
  <!-- Normal kitchen scene -->
  <rect x="0" y="280" width="600" height="120" fill="#deb887"/>
  <rect x="0" y="260" width="600" height="30" fill="#c4a882"/>
  <!-- Table -->
  <rect x="100" y="240" width="400" height="25" rx="4" fill="#8b6914"/>
  <rect x="130" y="265" width="20" height="60" fill="#6b4f10"/>
  <rect x="450" y="265" width="20" height="60" fill="#6b4f10"/>
  <!-- Cup on table -->
  <rect x="260" y="205" width="50" height="40" rx="4" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <ellipse cx="285" cy="205" rx="25" ry="7" fill="#e0e0e0"/>
  <!-- Flying fish (unexpected element) -->
  <ellipse cx="440" cy="120" rx="60" ry="25" fill="#4a9eff" opacity="0.9"/>
  <polygon points="500,120 530,100 530,140" fill="#4a9eff"/>
  <circle cx="420" cy="115" r="5" fill="black"/>
  <text x="430" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">?</text>
  <text x="300" y="395" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#888">Image 010</text>
</svg>
