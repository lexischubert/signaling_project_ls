{{ block title }}Raundi ya Mazoezi{{ endblock }}

{{ block styles }}
<link rel="stylesheet" href="/static/katex/katex.min.css">
<style>
  /* ── Reset ─────────────────────────────────────────────────────── */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    background: #f0f4f8;
  }
  #otree-timeout { display: none !important; }

  /* ── Full-viewport shell ───────────────────────────────────────── */
  #prac-shell {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    padding: 6px 10px 8px;
    box-sizing: border-box;
    gap: 5px;
  }

  /* ── Banner ────────────────────────────────────────────────────── */
  #banner {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: clamp(32px, 5vmin, 48px);
  }
  #b-icon { font-size: clamp(1.3rem, 3.5vmin, 1.9rem); line-height: 1; }
  #b-text {
    font-size: clamp(.82rem, 2.3vmin, 1rem);
    font-weight: 700;
    color: #1e293b;
    text-align: center;
  }
  #banner.well-done #b-text { color: #15803d; }
  #banner.wrong-ans #b-text { color: #b91c1c; }

  /* ── Task card (fills remaining space) ────────────────────────── */
  #inner-card {
    flex: 1;
    min-height: 0;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.10);
    display: flex;
    flex-direction: column;
    padding: 10px 10px 10px;
    gap: 8px;
    box-sizing: border-box;
  }

  /* ── Target row ────────────────────────────────────────────────── */
  #target-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .task-prompt {
    flex: 1;
    font-size: clamp(.78rem, 2.1vmin, .93rem);
    color: #334155;
    font-weight: 500;
  }
  #demo-target {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width:  clamp(52px, 9vmin, 74px);
    height: clamp(52px, 9vmin, 74px);
    font-size: clamp(1.3rem, 4.5vmin, 2.3rem);
    border: 2.5px solid #2563eb;
    border-radius: 8px;
    background: #eff6ff;
    overflow: hidden;
    box-sizing: border-box;
  }
  #demo-target .katex-display { margin: 0; }

  /* ── Loading ────────────────────────────────────────────────────── */
  #loading-msg {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(.9rem, 2.5vmin, 1rem);
    color: #94a3b8;
  }

  /* ── Grid area ─────────────────────────────────────────────────── */
  #grid-wrapper {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #demo-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-template-rows: repeat(10, 1fr);
    gap: 3px;
    user-select: none;
  }
  .dcell {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #dee2e6;
    border-radius: 4px;
    background: #f8f9fa;
    cursor: pointer;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background .07s, border-color .07s, box-shadow .07s;
  }
  .dcell:active  { background: #e9ecef; }
  .dcell.selected {
    background: #dbeafe;
    border-color: #2563eb;
    box-shadow: inset 0 0 0 1px #2563eb;
  }
  .dcell.locked { pointer-events: none; }

  /* ── Confirm button ────────────────────────────────────────────── */
  #confirm-btn {
    flex-shrink: 0;
    width: 100%;
    padding: clamp(10px, 1.8vmin, 14px) 0;
    font-size: clamp(.88rem, 2.4vmin, 1.03rem);
    font-weight: 700;
    letter-spacing: .01em;
    border: none;
    border-radius: 9px;
    background: #2563eb;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #confirm-btn:active   { background: #1d4ed8; }
  #confirm-btn:disabled { background: #94a3b8; cursor: not-allowed; opacity: .6; }

  /* ── Task container — hidden until first task arrives ─────────── */
  #task-container { display: none; }
</style>
{{ endblock }}

{{ block content }}
<div id="prac-shell">

  <div id="banner">
    <span id="b-icon">🧪</span>
    <span id="b-text">Raundi ya mazoezi</span>
  </div>

  <div id="inner-card">
    <div id="loading-msg">Inapakia&hellip;</div>

    <div id="task-container">
      <div id="target-row">
        <span class="task-prompt">Tafuta alama zote zinazolingana:</span>
        <div id="demo-target"></div>
      </div>
      <div id="grid-wrapper">
        <div id="demo-grid"></div>
      </div>
      <button type="button" id="confirm-btn">
        &#10003;&nbsp;&nbsp;Thibitisha Uteuzi
      </button>
    </div>
  </div>

</div>

<div style="display:none;" id="real-next">{{ next_button }}</div>

<script src="/static/katex/katex.min.js"></script>
<script>
var _trial    = 0;
var _selected = new Set();
var _startMs  = null;

function rl(latex, dm) {
  try { return katex.renderToString(latex, { displayMode: !!dm, throwOnError: false }); }
  catch(e) { return latex; }
}

function sizeGrid() {
  var wrapper = document.getElementById('grid-wrapper');
  var grid    = document.getElementById('demo-grid');
  var sz = Math.min(wrapper.clientWidth, wrapper.clientHeight) - 2;
  if (sz < 50) return;
  grid.style.width     = sz + 'px';
  grid.style.height    = sz + 'px';
  var cell = (sz - 27) / 10;
  grid.style.fontSize  = Math.max(9, Math.round(cell * 0.30)) + 'px';
}

function setBanner(state, icon, text) {
  var banner = document.getElementById('banner');
  banner.classList.remove('well-done', 'wrong-ans');
  if (state !== 'neutral') banner.classList.add(state);
  document.getElementById('b-icon').textContent = icon;
  document.getElementById('b-text').textContent = text;
}

function showTask(task, feedbackState) {
  _trial++;
  _selected = new Set();
  _startMs  = Date.now();

  document.getElementById('demo-target').innerHTML = rl(task.target.latex, true);

  var grid = document.getElementById('demo-grid');
  grid.innerHTML = '';
  task.grid.forEach(function(sym, idx) {
    var cell = document.createElement('div');
    cell.className = 'dcell';
    cell.innerHTML = rl(sym.latex, false);
    cell.addEventListener('click', function() {
      if (_selected.has(idx)) {
        _selected.delete(idx);
        cell.classList.remove('selected');
      } else {
        _selected.add(idx);
        cell.classList.add('selected');
      }
    });
    grid.appendChild(cell);
  });

  document.getElementById('loading-msg').style.display    = 'none';
  var tc = document.getElementById('task-container');
  tc.style.display        = 'flex';
  tc.style.flexDirection  = 'column';
  tc.style.flex           = '1';
  tc.style.minHeight      = '0';
  document.getElementById('confirm-btn').disabled = false;

  if (feedbackState === 'correct') {
    setBanner('well-done', '✅', 'Vizuri sana! Jaribu mara moja zaidi kabla hatujaanza.');
  } else if (feedbackState === 'wrong') {
    setBanner('wrong-ans', '❌', 'Sijafanikiwa — lakini endelea, kazi halisi inafanya kazi vivyo hivyo.');
  } else {
    setBanner('neutral', '🧪', 'Raundi ya mazoezi');
  }

  requestAnimationFrame(sizeGrid);
}

function liveRecv(data) {
  if (data.type === 'task') {
    showTask(data.task, null);
  }
  if (data.type === 'next_task') {
    var feedback = data.is_correct ? 'correct' : 'wrong';
    showTask(data.task, feedback);
  }
  if (data.type === 'practice_complete') {
    if (data.is_correct) {
      setBanner('well-done', '✅', 'Vizuri sana! Tunaendelea…');
    } else {
      setBanner('wrong-ans', '❌', 'Sijafanikiwa — tunaendelea kwenye kazi halisi.');
    }
    setTimeout(function() {
      var real = document.querySelector('#real-next button, #real-next input[type=submit]');
      if (real) real.click();
    }, 1800);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  window.addEventListener('resize', function() { if (_trial > 0) sizeGrid(); });

  document.getElementById('confirm-btn').addEventListener('click', function() {
    if (_trial === 0) return;
    var btn = document.getElementById('confirm-btn');
    btn.disabled = true;

    document.querySelectorAll('.dcell').forEach(function(c) { c.classList.add('locked'); });
    document.getElementById('task-container').style.display = 'none';
    document.getElementById('loading-msg').style.display    = '';
    setBanner('neutral', '🧪', 'Raundi ya mazoezi');

    liveSend({
      type:          'submit_practice',
      trial:         _trial,
      clicked_cells: Array.from(_selected).sort(function(a, b) { return a - b; }),
    });
  });

  liveSend({ type: 'request_task' });
});
</script>
{{ endblock }}
