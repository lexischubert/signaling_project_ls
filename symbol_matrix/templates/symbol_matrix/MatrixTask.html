{{ block styles }}
<link rel="stylesheet" href="/static/katex/katex.min.css">
<style>
  /* ── Reset / prevent any scroll ───────────────────────────────── */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    background: #f0f4f8;
  }

  /* Hide oTree chrome */
  #otree-timeout { display: none !important; }

  /* ── Full-viewport shell ───────────────────────────────────────── */
  #shell {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    padding: 8px 10px 10px;
    box-sizing: border-box;
    gap: 6px;
  }

  /* ── Target row ────────────────────────────────────────────────── */
  #target-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #fff;
    border-radius: 10px;
    padding: 7px 12px;
    box-shadow: 0 1px 5px rgba(0,0,0,.09);
  }
  #task-prompt {
    font-size: clamp(.78rem, 2.1vmin, .93rem);
    font-weight: 500;
    color: #334155;
    line-height: 1.3;
  }
  #target-display {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width:  clamp(54px, 9vmin, 78px);
    height: clamp(54px, 9vmin, 78px);
    border: 2.5px solid #2563eb;
    border-radius: 8px;
    background: #eff6ff;
    font-size: clamp(1.3rem, 4.5vmin, 2.4rem);
    overflow: hidden;
    box-sizing: border-box;
  }
  #target-display .katex-display { margin: 0; }

  /* ── Grid area ─────────────────────────────────────────────────── */
  #grid-wrapper {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #loading-msg {
    font-size: clamp(.9rem, 2.5vmin, 1rem);
    color: #94a3b8;
  }
  #sym-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 3px;
    /* width/height/font-size set by sizeGrid() */
  }
  .sym-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #dee2e6;
    border-radius: 4px;
    background: #f8f9fa;
    cursor: pointer;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background .07s, border-color .07s;
  }
  .sym-cell:active  { background: #e9ecef; }
  .sym-cell.selected {
    background: #dbeafe;
    border-color: #2563eb;
    box-shadow: inset 0 0 0 1px #2563eb;
  }

  /* ── Confirm button ────────────────────────────────────────────── */
  #confirm-btn {
    flex-shrink: 0;
    width: 100%;
    padding: clamp(10px, 1.8vmin, 15px) 0;
    font-size: clamp(.9rem, 2.4vmin, 1.05rem);
    font-weight: 700;
    letter-spacing: .01em;
    border: none;
    border-radius: 9px;
    background: #2563eb;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #confirm-btn:active   { background: #1d4ed8; }
  #confirm-btn:disabled { background: #94a3b8; cursor: not-allowed; }
</style>
{{ endblock }}

{{ block content }}
<div id="shell">

  <div id="target-row">
    <span id="task-prompt">Find all matching symbols in the grid:</span>
    <div id="target-display"></div>
  </div>

  <div id="grid-wrapper">
    <div id="loading-msg">Loading&hellip;</div>
    <div id="sym-grid" style="display:none;"></div>
  </div>

  <button type="button" id="confirm-btn" disabled>
    ✓&nbsp;&nbsp;Confirm Selection
  </button>

</div>

<!-- oTree needs this in the DOM to auto-advance on timeout -->
<div style="display:none;">{{ next_button }}</div>

<script src="/static/katex/katex.min.js"></script>
<script>
var _task  = null;
var _sel   = new Set();
var _start = null;

function rl(latex, dm) {
  try { return katex.renderToString(latex, { displayMode: !!dm, throwOnError: false }); }
  catch(e) { return '<span style="color:red">?</span>'; }
}

function sizeGrid() {
  var wrapper = document.getElementById('grid-wrapper');
  var grid    = document.getElementById('sym-grid');
  // Square grid = min of available width and height
  var sz = Math.min(wrapper.clientWidth, wrapper.clientHeight) - 2;
  if (sz < 50) return;
  grid.style.width  = sz + 'px';
  grid.style.height = sz + 'px';
  // Font size ≈ 30% of cell size (cell ≈ (sz - 7 gaps) / 8)
  var cell = (sz - 21) / 8;
  grid.style.fontSize = Math.max(9, Math.round(cell * 0.30)) + 'px';
}

function showTask(task) {
  _task  = task;
  _sel   = new Set();
  _start = Date.now();

  document.getElementById('target-display').innerHTML = rl(task.target.latex, true);

  var g = document.getElementById('sym-grid');
  g.innerHTML = '';
  task.grid.forEach(function(sym, idx) {
    var c = document.createElement('div');
    c.className = 'sym-cell';
    c.innerHTML = rl(sym.latex, false);
    c.addEventListener('click', function() {
      if (_sel.has(idx)) { _sel.delete(idx); c.classList.remove('selected'); }
      else               { _sel.add(idx);    c.classList.add('selected'); }
    });
    g.appendChild(c);
  });

  document.getElementById('loading-msg').style.display = 'none';
  g.style.display = '';
  document.getElementById('confirm-btn').disabled = false;
  requestAnimationFrame(sizeGrid);
}

function liveRecv(data) {
  if (data.type === 'task' || data.type === 'next_task') showTask(data.task);
}

document.addEventListener('DOMContentLoaded', function() {
  window.addEventListener('resize', function() { if (_task) sizeGrid(); });

  document.getElementById('confirm-btn').addEventListener('click', function() {
    if (!_task) return;
    var btn = document.getElementById('confirm-btn');
    btn.disabled = true;

    liveSend({
      type:          'submit_answer',
      clicked_cells: Array.from(_sel).sort(function(a, b) { return a - b; }),
      target_latex:  _task.target.latex,
      time_taken_ms: Date.now() - _start,
    });
    _task = null;

    // Show loading state while waiting for next task
    document.getElementById('sym-grid').style.display = 'none';
    document.getElementById('loading-msg').style.display = '';
  });

  liveSend({ type: 'request_task' });
});
</script>
{{ endblock }}
