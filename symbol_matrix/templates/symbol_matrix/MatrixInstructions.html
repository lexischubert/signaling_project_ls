{{ block styles }}
<link rel="stylesheet" href="/static/katex/katex.min.css">
<style>
  /* ── Reset ─────────────────────────────────────────────────────── */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    background: #f0f4f8;
  }

  /* ── Full-viewport shell ───────────────────────────────────────── */
  #tut-shell {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    padding: 6px 10px 8px;
    box-sizing: border-box;
    gap: 5px;
  }

  /* ── Progress dots ─────────────────────────────────────────────── */
  #step-nav {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 2px 0;
  }
  .sdot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #c8d3df;
    transition: background .3s, transform .2s;
  }
  .sdot.done { background: #4ade80; }
  .sdot.now  { background: #2563eb; transform: scale(1.4); }

  /* ── Banner ────────────────────────────────────────────────────── */
  #banner {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: clamp(32px, 5vmin, 48px);
  }
  #b-icon { font-size: clamp(1.3rem, 3.5vmin, 1.9rem); line-height: 1; }
  #b-text {
    font-size: clamp(.82rem, 2.3vmin, 1rem);
    font-weight: 700;
    color: #1e293b;
    text-align: center;
  }

  /* ── Task card (fills remaining space) ────────────────────────── */
  #task-card {
    flex: 1;
    min-height: 0;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.10);
    display: flex;
    flex-direction: column;
    padding: 10px 10px 10px;
    gap: 8px;
    box-sizing: border-box;
  }

  /* ── Target ────────────────────────────────────────────────────── */
  #demo-target {
    flex-shrink: 0;
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width:  clamp(52px, 9vmin, 74px);
    height: clamp(52px, 9vmin, 74px);
    font-size: clamp(1.3rem, 4.5vmin, 2.3rem);
    border: 2.5px solid #2563eb;
    border-radius: 8px;
    background: #eff6ff;
    overflow: hidden;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #demo-target .katex-display { margin: 0; }
  #demo-target.pulse { animation: target-pulse 1.1s infinite; }
  @keyframes target-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(37,99,235,.65); }
    70%  { box-shadow: 0 0 0 14px rgba(37,99,235,0); }
    100% { box-shadow: 0 0 0 0   rgba(37,99,235,0); }
  }

  /* ── Found-dots ────────────────────────────────────────────────── */
  #found-dots {
    display: none;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #found-dots.show { display: flex; }
  .fdot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid #adb5bd;
    background: #e9ecef;
    transition: background .25s, border-color .25s;
  }
  .fdot.found { background: #22c55e; border-color: #16a34a; }

  /* ── Grid area ─────────────────────────────────────────────────── */
  #grid-wrapper {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #demo-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 3px;
    user-select: none;
    /* width/height/font-size set by sizeGrid() */
  }
  #demo-grid.dim { opacity: 0.15; pointer-events: none; }

  .dcell {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #dee2e6;
    border-radius: 4px;
    background: #f8f9fa;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background .07s, border-color .07s, box-shadow .07s;
  }
  .dcell.hint {
    cursor: pointer;
    animation: hint-pulse 1.1s ease-in-out infinite;
  }
  @keyframes hint-pulse {
    0%,100% { border-color: #dee2e6; box-shadow: none; }
    50%     { border-color: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,.5); }
  }
  .dcell.selected {
    background: #dbeafe;
    border-color: #2563eb;
    box-shadow: inset 0 0 0 1px #2563eb;
    cursor: pointer;
  }
  .dcell.wrong {
    background: rgba(239,68,68,.18);
    border-color: #f87171;
  }
  .dcell.locked { pointer-events: none; }

  /* ── Action area (Next btn or Confirm btn — same slot) ─────────── */
  #action-area {
    flex-shrink: 0;
  }
  .action-btn {
    width: 100%;
    padding: clamp(10px, 1.8vmin, 14px) 0;
    font-size: clamp(.88rem, 2.4vmin, 1.03rem);
    font-weight: 700;
    letter-spacing: .01em;
    border: none;
    border-radius: 9px;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #next-btn {
    background: #2563eb;
  }
  #next-btn:active { background: #1d4ed8; }

  #demo-confirm {
    background: #6c757d;
    opacity: .55;
    cursor: not-allowed;
  }
  #demo-confirm.ready {
    background: #2563eb;
    opacity: 1;
    cursor: pointer;
    animation: confirm-pulse .9s infinite;
  }
  #demo-confirm:active { background: #1d4ed8; }
  @keyframes confirm-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(37,99,235,.7); }
    70%  { box-shadow: 0 0 0 12px rgba(37,99,235,0); }
    100% { box-shadow: 0 0 0 0   rgba(37,99,235,0); }
  }

  /* ── Well-done flash overlay ───────────────────────────────────── */
  #well-done {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    background: rgba(34,197,94,.15);
    z-index: 800;
    font-size: 5rem;
    pointer-events: none;
    animation: flash-in .35s ease;
  }
  #well-done.show { display: flex; }
  @keyframes flash-in {
    from { opacity: 0; transform: scale(.6); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
{{ endblock }}

{{ block content }}
<div id="tut-shell">

  <div id="step-nav">
    <div class="sdot now" id="d1"></div>
    <div class="sdot"     id="d2"></div>
    <div class="sdot"     id="d3"></div>
    <div class="sdot"     id="d4"></div>
    <div class="sdot"     id="d5"></div>
  </div>

  <div id="banner">
    <span id="b-icon"></span>
    <span id="b-text"></span>
  </div>

  <div id="task-card">
    <div id="demo-target"></div>
    <div id="found-dots"></div>
    <div id="grid-wrapper">
      <div id="demo-grid" class="dim"></div>
    </div>
    <div id="action-area">
      <!-- Both buttons occupy the same space; only one is shown at a time -->
      <button type="button" class="action-btn" id="next-btn" style="display:none;">
        Next &rarr;
      </button>
      <button type="button" class="action-btn" id="demo-confirm" disabled>
        &#10003;&nbsp;&nbsp;Confirm Selection
      </button>
    </div>
  </div>

</div>

<div id="well-done">&#9989;</div>
<div style="display:none;" id="real-next">{{ next_button }}</div>

<script src="/static/katex/katex.min.js"></script>
<script>
(function () {
'use strict';

/* ── Fixed tutorial grid ─────────────────────────────────────────
   Target: \alpha   Correct positions (0-based): 6, 20, 37, 54
   ─────────────────────────────────────────────────────────────── */
var TARGET_LATEX = '\\alpha';
var CORRECT      = [6, 20, 37, 54];
var DISTRACTORS  = ['\\beta','\\gamma','\\delta','\\varepsilon','\\zeta','\\eta','\\theta'];

function buildGrid() {
  var g = [];
  for (var i = 0; i < 64; i++) g.push(DISTRACTORS[i % DISTRACTORS.length]);
  CORRECT.forEach(function(p) { g[p] = TARGET_LATEX; });
  return g;
}
var GRID = buildGrid();

/* ── Helpers ─────────────────────────────────────────────────── */
function rl(latex, dm) {
  try { return katex.renderToString(latex, { displayMode: !!dm, throwOnError: false }); }
  catch(e) { return latex; }
}

function sizeGrid() {
  var wrapper = document.getElementById('grid-wrapper');
  var grid    = document.getElementById('demo-grid');
  var sz = Math.min(wrapper.clientWidth, wrapper.clientHeight) - 2;
  if (sz < 50) return;
  grid.style.width     = sz + 'px';
  grid.style.height    = sz + 'px';
  var cell = (sz - 21) / 8;
  grid.style.fontSize  = Math.max(9, Math.round(cell * 0.30)) + 'px';
}

var cells = [];
var found = new Set();

function buildCells() {
  var container = document.getElementById('demo-grid');
  container.innerHTML = '';
  cells = [];
  GRID.forEach(function(latex) {
    var c = document.createElement('div');
    c.className = 'dcell locked';
    c.innerHTML = rl(latex, false);
    cells.push(c);
    container.appendChild(c);
  });
  document.getElementById('demo-target').innerHTML = rl(TARGET_LATEX, true);
  requestAnimationFrame(sizeGrid);
}

function setDots(n) {
  for (var i = 1; i <= 5; i++) {
    var d = document.getElementById('d' + i);
    d.className = 'sdot' + (i < n ? ' done' : i === n ? ' now' : '');
  }
}
function setBanner(icon, text) {
  document.getElementById('b-icon').textContent = icon;
  document.getElementById('b-text').textContent = text;
}
function flash(fn) {
  var wd = document.getElementById('well-done');
  wd.classList.add('show');
  setTimeout(function() { wd.classList.remove('show'); fn(); }, 700);
}

/* Show next-btn or confirm-btn in the action area */
function showNext() {
  document.getElementById('next-btn').style.display     = '';
  document.getElementById('demo-confirm').style.display = 'none';
}
function showConfirm(enabled) {
  document.getElementById('next-btn').style.display     = 'none';
  var btn = document.getElementById('demo-confirm');
  btn.style.display = '';
  btn.disabled = !enabled;
  if (enabled) btn.classList.add('ready');
  else         btn.classList.remove('ready');
}

/* ── Step 1: target pulses, participant taps Next ────────────── */
function step1() {
  setDots(1);
  setBanner('👁', 'This is the symbol you need to find.');
  document.getElementById('demo-grid').classList.add('dim');
  document.getElementById('demo-target').classList.add('pulse');
  showNext();

  var nextBtn = document.getElementById('next-btn');
  nextBtn.addEventListener('click', function onNext() {
    nextBtn.removeEventListener('click', onNext);
    document.getElementById('demo-target').classList.remove('pulse');
    flash(step2);
  });
}

/* ── Step 2: one hinted cell, participant taps it ────────────── */
function step2() {
  setDots(2);
  setBanner('👆', 'Find it in the grid and tap it.');
  document.getElementById('demo-grid').classList.remove('dim');
  showConfirm(false);

  var target = CORRECT[0];
  cells.forEach(function(cell, idx) {
    cell.className = 'dcell locked';
    if (idx === target) {
      cell.className = 'dcell hint';
      cell.addEventListener('click', function onTap() {
        cell.removeEventListener('click', onTap);
        cell.className = 'dcell selected';
        found.add(target);
        flash(step3);
      });
    }
  });
}

/* ── Step 3: tap selected cell again to deselect ────────────── */
function step3() {
  setDots(3);
  setBanner('👆', 'Tapped by mistake? Tap again to remove it.');
  showConfirm(false);

  var target = CORRECT[0];
  var cell = cells[target];
  cell.className = 'dcell selected hint';
  cell.addEventListener('click', function onTap() {
    cell.removeEventListener('click', onTap);
    cell.className = 'dcell';
    found.delete(target);
    flash(step4);
  });
}

/* ── Step 4: find all 4 correct cells ───────────────────────── */
function step4() {
  setDots(4);
  setBanner('✋', 'Now find ALL matching symbols and tap them.');
  showConfirm(false);

  var fd = document.getElementById('found-dots');
  fd.innerHTML = '';
  CORRECT.forEach(function(_, i) {
    var dot = document.createElement('div');
    dot.className = 'fdot';
    dot.id = 'fd4_' + i;
    fd.appendChild(dot);
  });
  fd.classList.add('show');

  cells.forEach(function(cell, idx) {
    cell.className = 'dcell';
    var isCorrect = CORRECT.indexOf(idx) !== -1;
    if (isCorrect) cell.classList.add('hint');

    cell.addEventListener('click', function onTap() {
      if (found.has(idx)) return;
      if (!isCorrect) {
        cell.classList.add('wrong');
        setTimeout(function() { cell.classList.remove('wrong'); }, 500);
        return;
      }
      cell.removeEventListener('click', onTap);
      cell.className = 'dcell selected';
      found.add(idx);
      document.getElementById('fd4_' + CORRECT.indexOf(idx)).classList.add('found');

      if (found.size === CORRECT.length) {
        cells.forEach(function(c) { c.classList.add('locked'); });
        setTimeout(function() {
          document.getElementById('found-dots').classList.remove('show');
          flash(step5);
        }, 600);
      }
    });
  });
}

/* ── Step 5: tap Confirm to finish tutorial ─────────────────── */
function step5() {
  setDots(5);
  setBanner('✅', 'Found them all! Now tap Confirm to continue.');
  showConfirm(true);

  document.getElementById('demo-confirm').addEventListener('click', function() {
    var real = document.querySelector('#real-next button, #real-next input[type=submit]');
    if (real) real.click();
  });
}

/* ── Init ────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function() {
  window.addEventListener('resize', sizeGrid);
  buildCells();
  step1();
});

}());
</script>
{{ endblock }}
